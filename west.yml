manifest:
  version: "0.10"
  projects:
    # Specify the nRF-Connect SDK as a project dependency.
    - name: sdk-nrf
      path: nrf
      url: https://github.com/nrfconnect/sdk-nrf.git
      revision: v3.0.1
      import: true

    - name: openearable-protocol
      url: https://github.com/OpenEarable/protocol.git
      revision: main
      path: external/protocol
      # import: true